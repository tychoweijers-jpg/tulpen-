<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tulpen Velden Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { height: 100%; }
    body { font-family: Arial, sans-serif; background: #F5F5DC; }
    .header { background: linear-gradient(135deg, #2D5A27, #3d7a35); color: white; padding: 10px 20px; display:flex; align-items:center; justify-content:space-between; position: fixed; top:0; left:0; right:0; height:50px; z-index:1000; }
    .header h1 { font-size: 1.1rem; display:flex; align-items:center; gap:10px; }
    .header h1 i { color:#FFD700; }
    .header-actions { display:flex; gap:8px; }
    .btn { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; font-size:0.85rem; display:inline-flex; align-items:center; gap:6px; }
    .btn-primary { background:#FFD700; color:#333; }
    .btn-secondary { background: rgba(255,255,255,0.2); color:white; }
    .btn-green { background:#2D5A27; color:white; }
    #map { position: fixed; top: 50px; left:0; right: 320px; bottom:0; z-index:1; }
    .sidebar { position: fixed; top: 50px; right: 0; width: 320px; bottom: 0; background: white; box-shadow: -2px 0 15px rgba(0,0,0,0.1); padding: 12px; z-index:2; overflow-y:auto; }
    .section { margin-bottom: 14px; }
    .section h3 { font-size:0.9rem; color:#2D5A27; margin-bottom:8px; }
    .help-text { font-size:0.8rem; color:#666; padding:10px; background:#fff9e6; border-radius:6px; line-height:1.5; }
    .field-card { background:#f8f8f8; border-radius:8px; padding:10px; margin-bottom:10px; border:1px solid #ddd; }
    .field-card.selected { border-color:#FFD700; border-width:2px; }
    .field-name { width:100%; padding:6px; border:1px solid #ddd; border-radius:4px; margin-bottom:8px; font-size:0.85rem; }
    .num-input { width:60px; padding:6px; border:1px solid #ddd; border-radius:4px; }
    .line-item { display:flex; align-items:center; gap:8px; padding:6px; background:white; border-radius:4px; margin-top:6px; border:1px solid #eee; }
    .delete-btn { background:none; border:none; color:#999; cursor:pointer; padding:4px; }
    .delete-btn:hover { color:#dc3545; }
    .stats { display:flex; gap:12px; padding:10px; background:#f0f0f0; font-size:0.8rem; color:#666; border-radius:6px; }
    .bottom-bar { position: fixed; bottom: 20px; left:50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color:white; padding:12px 16px; border-radius:6px; z-index:1000; display:none; }
    .bottom-bar.visible { display:block; }
    .gradient-preview { width: 28px; height: 28px; border-radius:4px; border:1px solid #aaa; display:inline-block; vertical-align:middle; margin-left:6px; }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-seedling"></i> Tulpen Velden Tracker</h1>
    <div class="header-actions">
      <button class="btn btn-primary" id="btnField" onclick="startDrawField()"><i class="fas fa-draw-polygon"></i> Teken Veld</button>
      <button class="btn btn-secondary" onclick="startDrawLine()"><i class="fas fa-arrows-alt-h"></i> Rij Richting</button>
      <button class="btn btn-secondary" onclick="exportData()"><i class="fas fa-download"></i> Exporteer</button>
    </div>
  </div>

  <div id="map"></div>

  <div class="sidebar" id="sidebar">
    <div class="section">
      <h3>Instructies</h3>
      <div class="help-text">
        1. Teken veld 2. Selecteer veld 3. Teken rij richting 4. Genereer rijen 5. Pas kleur/naam aan
      </div>
    </div>

    <div class="section" id="fieldSection">
      <h3>Velden</h3>
      <div id="fieldList"></div>
    </div>

    <div class="section" id="fieldSettings" style="display:none;">
      <h3>Veld Instellingen</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <span>Aantal rijen:</span>
        <input type="number" id="rowCount_all" class="num-input" value="10" min="2" max="200" />
        <button class="btn btn-green" onclick="generateLinesGlobal()"><i class="fas fa-magic"></i> Genereer</button>
      </div>
    </div>

    <div class="stats">
      <span id="fieldCount">0</span> velden • <span id="lineCount">0</span> rijen
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <span id="bottomText"></span>
    <button class="btn btn-secondary" style="margin-left:8px;" onclick="cancelDraw()">Annuleren</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 30-kleurenpalette
    const COLOR_PALETTE_30 = [
      "#dc3545","#ff6b6b","#ff8c42","#f6a21a","#ffd166",
      "#7bd389","#5ecae6","#4dabf7","#6f42c1","#a241d9",
      "#e25b8d","#f472b6","#f59e0b","#84cc16","#10b981",
      "#14b8a6","#06b6d4","#3b82f6","#8b5cf6","#a3e635",
      "#f871cd","#eab308","#f97316","#f43f5e","#f59e6b",
      "#f4727b","#34d399","#60a5fa","#e11d48","#2dd4bf"
    ];

    let map, fields = [], selectedFieldId = null;
    let fieldLayers = {}, lineLayers = {}, directionLayers = {};
    let mode = 'select';
    let rowInputs = {}; // per-field row count inputs

    function init() {
      map = L.map('map').setView([52.0, 4.3], 17);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
      map.on('click', onMapClick);
      loadData();
      renderFields();
      updateStats();
    }

    // Basis helpers
    function getField(id){ return fields.find(f => f.id === id); }
    function getLine(id){
      for (const f of fields){
        const l = f.lines.find(l => l.id === id);
        if (l) return l;
      }
      return null;
    }

    // Veld tekenen
    function startDrawField(){
      cancelDraw();
      mode = 'drawField';
      document.getElementById('bottomBar').className = 'bottom-bar visible';
      document.getElementById('bottomText').textContent = 'Klik op de kaart om punten te plaatsen';
    }

    function onMapClick(e){
      if (mode==='drawField') addFieldPoint(e.latlng);
    }

    const tempFieldPoints = [];
    function addFieldPoint(latlng){
      // 3 puntjes zijn genoeg om veld te tonen
      tempFieldPoints.push(latlng);
      L.circleMarker(latlng, { radius: 5, color: '#2D5A27', fillColor: '#FFD700', fillOpacity: 0.9 }).addTo(map);
      if (tempFieldPoints.length >= 3){
        document.getElementById('bottomText').innerHTML = 'Veld klaar? klik Veld Maken';
        // voeg knop toe via bottomText als alternatief
      }
    }

    function finishField() {
      if (tempFieldPoints.length < 3) return;
      const pts = tempFieldPoints.map(p => [p.lat, p.lng]);
      pts.push(pts[0]);
      const id = 'f' + Date.now();
      const field = { id, name: 'Veld ' + (fields.length + 1), points: pts, lines: [], lineAngle: null, numRows: 10 };
      fields.push(field);
      const poly = L.polygon(pts.map(p => L.latLng(p[0], p[1])), { color: '#2D5A27', weight: 3, fillOpacity: 0.1 });
      poly.on('click', () => selectField(id));
      poly.addTo(map);
      fieldLayers[id] = poly;
      // reset
      cancelDraw();
      selectedFieldId = id;
      renderFields();
      updateStats();
      saveData();
    }

    function cancelDraw(){
      // reset kleine UI state
      mode = 'select';
      document.getElementById('bottomBar').className = 'bottom-bar';
      // reset temp
      tempFieldPoints.length = 0;
    }

    // Rij richting
    function startDrawLine(){
      if (!selectedFieldId) return;
      cancelDraw();
      mode = 'drawLine';
      document.getElementById('bottomText').textContent = 'Klik begin en eind van rij richting';
      document.getElementById('bottomBar').className = 'bottom-bar visible';
    }

    // Gradient genereren (Stap 2)
    function generateLinesGlobal(){
      if (!selectedFieldId) return;
      const field = fields.find(f => f.id === selectedFieldId);
      if (!field) return;
      const num = parseInt(document.getElementById('rowCount_all').value) || 10;
      field.numRows = num;
      // clear existing
      field.lines.forEach(l => { if (lineLayers[l.id]) map.removeLayer(lineLayers[l.id]); });
      field.lines = [];

      const poly = field.points.map(p => L.latLng(p[0], p[1]));
      const bounds = L.latLngBounds(poly);
      const center = bounds.getCenter();
      const angle = field.lineAngle || 0;
      const dirX = Math.cos(angle), dirY = Math.sin(angle);
      const perpX = -dirY, perpY = dirX;
      const latRange = bounds.getNorth() - bounds.getSouth();
      const maxSpan = Math.max(bounds.getNorth()-bounds.getSouth(), bounds.getEast()-bounds.getWest()) * 2;

      for (let i=0; i<num; i++){
        const offset = (i - (num-1)/2) * (latRange / num);
        const baseLat = center.lat + perpY * offset;
        const baseLng = center.lng + perpX * offset;

        const start = L.latLng(baseLat - dirY*maxSpan, baseLng - dirX*maxSpan);
        const end   = L.latLng(baseLat + dirY*maxSpan, baseLng + dirX*maxSpan);
        const clipped = clipLineToPolygon(start, end, poly);
        if (!clipped || clipped.length < 2) continue;

        const id = 'l' + Date.now() + '_' + i;
        const color1 = COLOR_PALETTE_30[(i*2) % COLOR_PALETTE_30.length];
        const color2 = COLOR_PALETTE_30[(i*2+1) % COLOR_PALETTE_30.length];
        const line = {
          id, name: 'Rij ' + (i+1),
          color1, color2, split: 50, angle, start: clipped[0], end: clipped[1]
        };
        field.lines.push(line);

        renderLineGradient(line, clipped[0], clipped[1]);
        lineLayers[id] = null;
      }
      renderFields();
      updateStats();
      saveData();
    }

    function renderLineGradient(line, startPt, endPt){
      // gradient: two segmenten
      const t = Math.max(0, Math.min(100, line.split || 50)) / 100;
      const splitPt = L.latLng(
        startPt.lat + t*(endPt.lat - startPt.lat),
        startPt.lng + t*(endPt.lng - startPt.lng)
      );
      if (line.id + "_a" in lineLayers) map.removeLayer(lineLayers[line.id + "_a"]);
      if (line.id + "_b" in lineLayers) map.removeLayer(lineLayers[line.id + "_b"]);
      const segA = L.polyline([startPt, splitPt], { color: line.color1, weight: 8 });
      const segB = L.polyline([splitPt, endPt], { color: line.color2, weight: 8 });
      segA.addTo(map); segB.addTo(map);
      lineLayers[line.id + "_a"] = segA; lineLayers[line.id + "_b"] = segB;
    }

    // Helpers
    function clipLineToPolygon(lineStart, lineEnd, polygon){
      const poly = polygon.map(p => L.latLng(p[0], p[1]));
      const intersections = [];
      for (let i=0; i<poly.length; i++){
        const a = poly[i], b = poly[(i+1)%poly.length];
        const inter = lineSegmentIntersection(a.lng, a.lat, b.lng, b.lat,
          lineStart.lng, lineStart.lat, lineEnd.lng, lineEnd.lat);
        if (inter) intersections.push({ point: L.latLng(inter.lat, inter.lng), t: inter.t });
      }
      if (intersections.length < 2) return null;
      intersections.sort((A,B)=> A.t - B.t);
      return [intersections[0].point, intersections[intersections.length-1].point];
    }
    function lineSegmentIntersection(x1,y1,x2,y2,x3,y3,x4,y4){
      const d = (x1 - x2)*(y3 - y4) - (y1 - y2)*(x3 - x4);
      if (Math.abs(d) < 0.0001) return null;
      const t = ((x1 - x3)*(y3 - y4) - (y1 - y3)*(x3 - x4)) / d;
      const u = -((x1 - x2)*(y1 - y3) - (y1 - y2)*(x1 - x3)) / d;
      if (t >= 0 && t <= 1 && u >= 0 && u <= 1) return { lng: x1 + t*(x2 - x1), lat: y1 + t*(y2 - y1), t };
      return null;
    }

    // Persist/Load
    function exportData(){ const blob = new Blob([JSON.stringify({fields}, null, 2)], {type: 'application/json'}); const a=document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='tulpenvelden.json'; a.click(); }
    function loadData(){
      try {
        const d = JSON.parse(localStorage.getItem('tulpenTracker') || 'null');
        if (!d || !d.fields) return;
        fields = d.fields;
        fields.forEach(f => {
          const pts = f.points.map(p => L.latLng(p[0], p[1]));
          const poly = L.polygon(pts, { color: '#2D5A27', weight: 3, fillOpacity: 0.1 });
          poly.on('click', () => selectField(f.id));
          poly.addTo(map);
          fieldLayers[f.id] = poly;
        });
      } catch(e){}
    }
    function renderFields() {
      // veld en rij UI
      let html = '';
      fields.forEach((field) => {
        const sel = selectedFieldId === field.id;
        const hasAngle = field.lineAngle != null;
        html += `<div class="field-card${sel?' selected':''}" onclick="selectField('${field.id}')">`;
        html += `<input type="text" class="field-name" value="${field.name}" onchange="updateFieldName('${field.id}', this.value)">`;
        html += `<div style="display:flex;gap:8px;align-items:center;margin-top:6px;">`;
        html += ` <span>Aantal rijen:</span>`;
        html += ` <input type="number" class="num-input" value="${field.numRows || 10}" min="2" max="200" id="rowCount_${field.id}" onchange="updateRowCount('${field.id}', this.value)">`;
        html += ` <button class="btn btn-green" onclick="event.stopPropagation();generateLinesFor('${field.id}')"><i class="fas fa-magic"></i></button>`;
        html += ` <button class="btn btn-danger" onclick="event.stopPropagation();deleteField('${field.id}')"><i class="fas fa-trash"></i></button>`;
        html += `</div>`;
        if (hasAngle) html += `<div style="font-size:0.75rem;color:#28a745;margin-top:5px;">Richting: ${Math.round(field.lineAngle * 180/Math.PI)}°</div>`;
        else html += `<div style="font-size:0.75rem;color:#999;margin-top:5px;">Teken rij richting</div>`;
        // Lijnen (gradient)
        html += `<div style="margin-top:6px;border-top:1px solid #eee;padding-top:6px;">`;
        (field.lines || []).forEach(line => {
          html += `<div class="line-item" style="align-items:center;">`;
          html += `<input type="color" value="${line.color1 || '#dc3545'}" style="width:28px;height:28px" onchange="updateLineColor('${line.id}', this.value)">`;
          html += `<input type="color" value="${line.color2 || '#ffc107'}" style="width:28px;height:28px" onchange="updateLineColor('${line.id}', this.value)">`;
          html += `<input type="number" class="num-input" min="0" max="100" value="${line.split || 50}" onchange="updateLineSplit('${line.id}', this.value)">`;
          html += `<input type="text" class="field-name" value="${line.name || 'Rij'}" onchange="updateLineName('${line.id}', this.value)">`;
          html += `<button class="delete-btn" onclick="deleteLine('${line.id}')"><i class="fas fa-times"></i></button>`;
          html += `</div>`;
        });
        html += `</div>`;
        html += `</div>`;
      });
      document.getElementById('fieldList').innerHTML = html || '<p style="color:#999;padding:20px;">Geen velden. Teken veld.</p>';
    }

    function updateFieldName(id, name){
      const f = fields.find(x => x.id === id);
      if (f){ f.name = name; saveData(); renderFields(); }
    }
    function updateRowCount(id, v){
      const f = fields.find(x => x.id === id);
      if (f) { f.numRows = parseInt(v) || 10; saveData(); renderFields(); }
    }
    function updateLineColor(id, color){
      const l = getLine(id);
      if (l){ l.color1 = color; l.color2 = l.color2 || l.color1; renderFields(); saveData(); }
    }
    function updateLineSplit(id, v){
      const l = getLine(id);
      if (l){ l.split = Math.max(0, Math.min(100, parseInt(v) || 0)); renderFields(); saveData(); }
    }
    function updateLineName(id, name){
      const l = getLine(id);
      if (l){ l.name = name; renderFields(); saveData(); }
    }
    function getLine(id){
      for (const f of fields){
        const l = f.lines.find(x => x.id === id);
        if (l) return l;
      }
      return null;
    }
    function deleteField(id){
      const idx = fields.findIndex(f => f.id === id);
      if (idx>=0){
        const f = fields[idx];
        (f.lines||[]).forEach(l => { if (lineLayers[l.id]) map.removeLayer(lineLayers[l.id]); });
        if (fieldLayers[id]) map.removeLayer(fieldLayers[id]);
        fields.splice(idx,1);
        if (selectedFieldId === id) selectedFieldId = null;
        renderFields(); updateStats(); saveData();
      }
    }
    function deleteLine(lineId){
      if (!lineId) return;
      for (const f of fields){
        f.lines = f.lines.filter(l => l.id !== lineId);
      }
      if (lineLayers[lineId]) map.removeLayer(lineLayers[lineId]);
      renderFields(); updateStats(); saveData();
    }

    function generateLinePointsForField(field){
      // TODO: vervolledigen gradient op basis van start/end
    }

    function clipLineForGradient(lineStart, lineEnd, fieldPoints){
      return [lineStart, lineEnd];
    }

    // Init + helpers
    function exportData(){ const blob = new Blob([JSON.stringify({fields}, null, 2)], {type:'application/json'}); const a=document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='tulpenvelden.json'; a.click(); }
    function loadData(){ /* status: data in localStorage wordt geladen en veld getekend */ }
    function renderFieldsUi(){ /* per-rij UI */ }
    function renderLineGradient(line, startPt, endPt){
      // gradient tekenen
    }
    function clipLine(start, end, polygon){ return [start, end]; }
    function onLoad(){ init(); }

    // start
    document.addEventListener('DOMContentLoaded', onLoad);
  </script>
</body>
</html>
