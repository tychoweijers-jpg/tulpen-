<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tulpen Velden Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { height: 100%; }
    body { font-family: Arial, sans-serif; background: #F5F5DC; }
    .header { background: linear-gradient(135deg, #2D5A27, #3d7a35); color: white; padding: 10px 20px; display:flex; align-items:center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; height: 50px; z-index: 1000; }
    .header h1 { font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
    .header h1 i { color: #FFD700; }
    .header-actions { display: flex; gap: 8px; }
    .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #FFD700; color: #333; }
    .btn-secondary { background: rgba(255,255,255,0.2); color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-green { background: #2D5A27; color: white; }
    #map { position: fixed; top: 50px; left: 0; right: 320px; bottom: 0; z-index: 1; }
    .sidebar { position: fixed; top: 50px; right: 0; width: 320px; bottom: 0; background: white; box-shadow: -2px 0 15px rgba(0,0,0,0.1); overflow-y: auto; padding: 12px; z-index: 2; }
    .section { margin-bottom: 14px; }
    .section h3 { font-size: 0.9rem; color: #2D5A27; margin-bottom: 8px; }
    .help-text { font-size: 0.8rem; color: #666; padding: 10px; background: #fff9e6; border-radius: 6px; line-height: 1.5; }
    .field-card { background: #f8f8f8; border-radius: 8px; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; }
    .field-card.selected { border-color: #FFD700; border-width: 2px; }
    .field-name { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; font-size: 0.85rem; }
    .num-input { width: 60px; padding: 6px; border: 1px solid #ddd; border-radius: 4px; }
    .line-item { display: flex; align-items: center; gap: 8px; padding: 6px; background: white; border-radius: 4px; margin-top: 6px; border: 1px solid #eee; }
    .delete-btn { background: none; border: none; color: #999; cursor: pointer; padding: 4px; }
    .delete-btn:hover { color: #dc3545; }
    .stats { display: flex; gap: 12px; padding: 10px; background: #f0f0f0; font-size: 0.8rem; color: #666; border-radius: 6px; }
    .bottom-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 16px; border-radius: 6px; z-index: 1000; display: none; }
    .bottom-bar.visible { display: block; }
    .gradient { display:inline-block; width: 28px; height: 28px; border-radius:4px; border:1px solid #ccc; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-seedling"></i> Tulpen Velden Tracker</h1>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="startDrawField()"><i class="fas fa-draw-polygon"></i> Teken Veld</button>
      <button class="btn btn-secondary" onclick="startDrawLine()"><i class="fas fa-arrows-alt-h"></i> Rij Richting</button>
      <button class="btn btn-secondary" onclick="exportData()"><i class="fas fa-download"></i> Exporteer</button>
    </div>
  </div>

  <div id="map"></div>

  <div class="sidebar" id="sidebar">
    <div class="section">
      <h3>Instructies</h3>
      <div class="help-text">
        1. Teken een veld<br>2. Selecteer veld<br>3. Teken rij richting<br>4. Genereer rijen<br>5. Pas kleur/naam aan
      </div>
    </div>

    <div class="section" id="fieldSection">
      <h3>Velden</h3>
      <div id="fieldList"></div>
    </div>

    <div class="section" id="fieldSettings" style="display:none;">
      <h3>Veld Instellingen</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <span>Aantal rijen:</span>
        <input type="number" id="rowCount_all" class="num-input" value="10" min="2" max="200" />
        <button class="btn btn-green" onclick="generateLinesGlobal()"><i class="fas fa-magic"></i> Genereer</button>
      </div>
    </div>

    <div class="stats">
      <span id="fieldCount">0</span> velden • <span id="lineCount">0</span> rijen
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <span id="bottomText"></span>
    <button class="btn btn-secondary" style="margin-left:8px;" onclick="cancelDraw()">Annuleren</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Palette
    const COLOR_PALETTE_30 = [
      "#dc3545","#ff6b6b","#ff8c42","#f6a21a","#ffd166",
      "#7bd389","#5ecae6","#4dabf7","#6f42c1","#a241d9",
      "#e25b8d","#f472b6","#f59e0b","#84cc16","#10b981",
      "#14b8a6","#06b6d4","#3b82f6","#8b5cf6","#a3e635",
      "#f871cd","#eab308","#f97316","#f43f5e","#f59e6b",
      "#f4727b","#34d399","#60a5fa","#e11d48","#2dd4bf"
    ];

    let map, fields = [], selectedFieldId = null, fieldLayers = {}, lineLayers = {}, directionLayers = {};
    let mode = 'select';
    let currentFieldPoints = []; // punten voor veld tekenen
    let currentFieldId = null;

    function init() {
      map = L.map('map').setView([52.0, 4.3], 17);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
      map.on('click', onMapClick);
      loadData();
      renderFields();
      updateStats();
    }

    function onMapClick(e){
      if (mode === 'drawField') addFieldPoint(e.latlng);
      if (mode === 'drawLine') addLinePoint(e.latlng);
    }

    // Veld tekenen
    function startDrawField(){
      cancelDraw();
      mode = 'drawField';
      currentFieldPoints = [];
      document.getElementById('bottomBar').className = 'bottom-bar visible';
      document.getElementById('bottomText').textContent = 'Teken Veld: klik punten op de kaart. Druk op Veld Maken als klaar.';
    }

    function addFieldPoint(latlng){
      currentFieldPoints.push(latlng);
      // Tekenen tijdelijk veld punt op kaart
      L.circleMarker(latlng, { radius: 5, color: '#2D5A27', fillColor: '#FFD700', fillOpacity: 0.9 }).addTo(map);
      if (currentFieldPoints.length >= 3){
        // Tekenen eerste preview veld (poly) zonder te maken
        const pts = currentFieldPoints.map(p => [p.lat, p.lng]);
        pts.push(pts[0]);
        if (window._tempFieldPolygon) map.removeLayer(window._tempFieldPolygon);
        window._tempFieldPolygon = L.polygon(pts.map(pp => L.latLng(pp[0], pp[1])), { color: '#2D5A27', weight: 2, fillOpacity: 0.08, dashArray: '5,5' }).addTo(map);
        document.getElementById('bottomText').innerHTML = '<strong>' + currentFieldPoints.length + ' punten</strong> - <button class="btn btn-primary" onclick="finishField()"><i class="fas fa-check"></i> Veld Maken</button>';
      }
    }

    function finishField(){
      if (currentFieldPoints.length < 3) {
        alert('Minimaal 3 punten nodig');
        return;
      }
      const pts = currentFieldPoints.map(p => [p.lat, p.lng]);
      pts.push(pts[0]);
      const id = 'f' + Date.now();
      const field = { id, name: 'Veld ' + (fields.length + 1), points: pts, lines: [], lineAngle: null, numRows: 10 };
      fields.push(field);

      const poly = L.polygon(pts.map(pp => L.latLng(pp[0], pp[1])), { color: '#2D5A27', weight: 3, fillOpacity: 0.1 });
      poly.on('click', () => selectField(id));
      poly.addTo(map);
      fieldLayers[id] = poly;

      // reset teken state
      cancelDraw();
      selectedFieldId = id;
      renderFields();
      updateStats();
      saveData();
    }

    function cancelDraw(){
      mode = 'select';
      if (window._tempFieldPolygon) { map.removeLayer(window._tempFieldPolygon); window._tempFieldPolygon = null; }
      // clear tempPoints
      currentFieldPoints = [];
      document.getElementById('bottomBar').className = 'bottom-bar';
      document.getElementById('bottomText').textContent = '';
    }

    // Rij richting tekenen (Stap 2: richting)
    function startDrawLine(){
      if (!selectedFieldId) return;
      cancelDraw();
      mode = 'drawLine';
      document.getElementById('bottomText').textContent = 'Klik beginpunt en eindpunt van rij richting';
      document.getElementById('bottomBar').className = 'bottom-bar visible';
      // reset gradient preview placeholder
      if (window._routePreview) map.removeLayer(window._routePreview);
      window._routePreview = null;
    }

    function addLinePoint(latlng){
      if (!window._gradientTmp) window._gradientTmp = { start: latlng };
      else {
        const end = latlng;
        const field = fields.find(f => f.id === selectedFieldId);
        if (field){
          const dx = end.lng - window._gradientTmp.start.lng;
          const dy = end.lat - window._gradientTmp.start.lat;
          field.lineAngle = Math.atan2(dx, dy);
        }
        // bevestig en start genereren
        window._gradientTmp = null;
        cancelDraw();
      }
    }

    // Genereren rijen met spacing 1.50m (Stap 2)
    function generateLinesGlobal() {
      if (!selectedFieldId) return;
      const field = fields.find(f => f.id === selectedFieldId);
      if (!field) return;
      field.numRows = parseInt(document.getElementById('rowCount_all').value) || 10;

      // verwijder vorige lijnen
      field.lines.forEach(l => { if (lineLayers[l.id]) map.removeLayer(lineLayers[l.id]); });
      field.lines = [];

      // Bereken lijnen langs rijrichting
      const poly = field.points.map(p => L.latLng(p[0], p[1]));
      const bounds = L.latLngBounds(poly);
      const center = bounds.getCenter();
      const angle = field.lineAngle || 0;
      const dirX = Math.cos(angle), dirY = Math.sin(angle);
      const perpX = -dirY, perpY = dirX;

      // spacing
      const spacingMeters = 1.5;
      const cosLat = Math.cos(center.lat * Math.PI/180);
      const degPerMeterLat = 1 / 111320;
      const degPerMeterLng = 1 / (111320 * cosLat);

      const num = field.numRows;
      for (let i=0; i<num; i++){
        const offsetMeters = (i - (num-1)/2) * spacingMeters;
        const baseLat = center.lat + perpY * offsetMeters * degPerMeterLat;
        const baseLng = center.lng + perpX * offsetMeters * degPerMeterLng;

        // Een lange lijn door het veld, daarna geknipt (clipLine)
        const spanDeg = 0.02;
        const p1 = L.latLng(baseLat - Math.cos(angle)*spanDeg, baseLng - Math.sin(angle)*spanDeg);
        const p2 = L.latLng(baseLat + Math.cos(angle)*spanDeg, baseLng + Math.sin(angle)*spanDeg);
        const clipped = clipLine(p1, p2, field.points);
        if (!clipped || clipped.length < 2) continue;

        const id = 'l' + Date.now() + '_' + i;
        // Kleurper rij
        const color1 = COLOR_PALETTE_30[(i*2) % COLOR_PALETTE_30.length];
        const color2 = COLOR_PALETTE_30[(i*2+1) % COLOR_PALETTE_30.length];
        const line = { id, name: 'Rij ' + (i+1), color1, color2, split: 50, angle, start: clipped[0], end: clipped[1] };
        field.lines.push(line);

        renderLineGradient(line, clipped[0], clipped[1]);
        lineLayers[id] = null;
      }

      renderFields();
      updateStats();
      saveData();
    }

    function renderLineGradient(line, startPt, endPt){
      // gradient tekenen: split bepaalt punt langs start-end
      const t = Math.max(0, Math.min(100, line.split || 50)) / 100;
      const splitPt = L.latLng(
        startPt.lat + t * (endPt.lat - startPt.lat),
        startPt.lng + t * (endPt.lng - startPt.lng)
      );
      // verwijder eventuele bestaande segmenten
      if (line.id + "_a" in lineLayers) map.removeLayer(lineLayers[line.id + "_a"]);
      if (line.id + "_b" in lineLayers) map.removeLayer(lineLayers[line.id + "_b"]);
      // twee segmenten
      const segA = L.polyline([startPt, splitPt], { color: line.color1, weight: 8 });
      const segB = L.polyline([splitPt, endPt], { color: line.color2, weight: 8 });
      segA.addTo(map); segB.addTo(map);
      lineLayers[line.id + "_a"] = segA; lineLayers[line.id + "_b"] = segB;
    }

    // Clip helpers
    function clipLine(start, end, polygon){
      const poly = polygon.map(p => L.latLng(p[0], p[1]));
      const pts = [];
      for (let i=0; i<poly.length; i++){
        const a = poly[i], b = poly[(i+1)%poly.length];
        const inter = lineSegmentIntersection(a.lng, a.lat, b.lng, b.lat, start.lng, start.lat, end.lng, end.lat);
        if (inter) pts.push({ p: L.latLng(inter.lat, inter.lng), t: inter.t });
      }
      if (pts.length < 2) return null;
      pts.sort((A,B)=> A.t - B.t);
      return [pts[0].p, pts[pts.length-1].p];
    }
    function lineSegmentIntersection(x1,y1,x2,y2,x3,y3,x4,y4){
      const d = (x1-x2)*(y3-y4) - (y1-y2)*(x3-x4);
      if (Math.abs(d) < 0.0001) return null;
      const t = ((x1-x3)*(y3-y4) - (y1-y3)*(x3-x4)) / d;
      const u = -((x1-x2)*(y1-y3) - (y1-y2)*(x1-x3)) / d;
      if (t>=0 && t<=1 && u>=0 && u<=1) return { lng: x1 + t*(x2-x1), lat: y1 + t*(y2-y1), t };
      return null;
    }

    // Export/import
    function exportData(){ const blob = new Blob([JSON.stringify({fields}, null, 2)], {type:'application/json'}); const a=document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='tulpenvelden.json'; a.click(); }
    function loadData(){ try { const d = JSON.parse(localStorage.getItem('tulpenTracker') || 'null'); if (!d || !d.fields) return; fields = d.fields; fields.forEach(f => { const pts = f.points.map(p => L.latLng(p[0], p[1])); const poly = L.polygon(pts, { color:'#2D5A27', weight:3, fillOpacity:0.1 }); poly.on('click', () => selectField(f.id)); poly.addTo(map); fieldLayers[f.id] = poly; }); } catch(e) {} }

    function renderFieldsInline() { /* placeholder voor extra UI */ }

    function updateStats() {
      document.getElementById('fieldCount').textContent = fields.length;
      const total = fields.reduce((acc,f)=> acc + (f.lines ? f.lines.length : 0), 0);
      document.getElementById('lineCount').textContent = total;
    }

    function saveData(){ try { localStorage.setItem('tulpenTracker', JSON.stringify({ fields })); } catch(e) {} }

    // Init
    init();
  </script>
</body>
</html>
